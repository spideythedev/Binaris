<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binaris — JWT Security Toolkit</title>
    <style>
        :root {
            --bg: #000;
            --surface: #0a0a0a;
            --border: #1f1f1f;
            --text: #fafafa;
            --muted: #a1a1aa;
            --dim: #52525b;
            --cyan: #06b6d4;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --purple: #8b5cf6;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); height: 56px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; letter-spacing: -0.3px; }
        .logo img { height: 24px; width: auto; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 240px; border-right: 1px solid var(--border);
            background: var(--surface); padding: 12px 0; overflow-y: auto; flex-shrink: 0;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 20px;
            cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s;
            border-left: 2px solid transparent;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.02); color: var(--text); }
        .sidebar-item.active { background: rgba(6,182,212,0.05); color: var(--cyan); border-left-color: var(--cyan); }
        .sidebar-item svg { width: 16px; height: 16px; opacity: 0.6; flex-shrink: 0; }
        .sidebar-item.active svg { opacity: 1; color: var(--cyan); }
        .content { flex: 1; padding: 24px; overflow-y: auto; }
        .tool-header { margin-bottom: 20px; }
        .tool-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
        .tool-header p { font-size: 13px; color: var(--muted); }
        .input-area { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
        textarea, input[type="text"] {
            width: 100%; background: #050505; border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; color: var(--text);
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 13px; outline: none; transition: border-color 0.15s; resize: vertical;
        }
        textarea:focus, input[type="text"]:focus { border-color: var(--cyan); }
        textarea { min-height: 100px; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
            border-radius: 8px; border: none; cursor: pointer; font-size: 13px;
            font-weight: 500; font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .btn-p { background: var(--cyan); color: #000; }
        .btn-p:hover { filter: brightness(1.1); }
        .btn-s { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-s:hover { background: #111; }
        .btn-sm { padding: 5px 10px; font-size: 11px; }
        .result-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 13px; white-space: pre-wrap; word-break: break-all;
            min-height: 60px; color: var(--muted); transition: all 0.2s;
        }
        .alert {
            padding: 10px 14px; border-radius: 8px; font-size: 12px;
            margin-top: 12px; display: flex; align-items: center; gap: 8px;
        }
        .alert-info { background: rgba(6,182,212,0.08); color: var(--cyan); border: 1px solid rgba(6,182,212,0.15); }
        .alert-warn { background: rgba(234,179,8,0.08); color: var(--yellow); border: 1px solid rgba(234,179,8,0.15); }
        .alert-danger { background: rgba(239,68,68,0.08); color: var(--red); border: 1px solid rgba(239,68,68,0.15); }
        .flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mt-2 { margin-top: 10px; }
        .mt-3 { margin-top: 16px; }
        .mb-2 { margin-bottom: 8px; }
        .hidden { display: none; }
        .badge {
            display: inline-flex; padding: 3px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .badge-g { background: rgba(34,197,94,0.1); color: var(--green); }
        .badge-r { background: rgba(239,68,68,0.1); color: var(--red); }
        .badge-y { background: rgba(234,179,8,0.1); color: var(--yellow); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; overflow-x: auto; padding: 0; }
            .sidebar-item { flex-shrink: 0; border-left: none; border-bottom: 2px solid transparent; font-size: 11px; padding: 10px 14px; }
            .sidebar-item.active { border-bottom-color: var(--cyan); }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="logo">
            <img src="binaris.png" alt="Binaris" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <span style="display:none">BINARIS</span>
        </div>
        <span style="font-size:11px;color:var(--dim);letter-spacing:0.5px">JWT SECURITY TOOLKIT</span>
    </nav>

    <div class="main-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content" id="main"></main>
    </div>

    <script>
        var tools = [
            { id: 'decode', name: 'Decode JWT', desc: 'Decode header, payload, and signature', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/></svg>' },
            { id: 'alg', name: 'Algorithm Check', desc: 'Detect algorithm and security issues', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>' },
            { id: 'none', name: 'alg=none Attack', desc: 'Test if none algorithm is accepted', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>' },
            { id: 'secret', name: 'Weak Secret Check', desc: 'Test against common weak secrets', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' },
            { id: 'expiry', name: 'Expiry Check', desc: 'Check token expiration status', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' },
            { id: 'confusion', name: 'Key Confusion', desc: 'Test RS256 to HS256 confusion', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>' },
            { id: 'claims', name: 'Claims Viewer', desc: 'View all claims with explanations', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>' },
            { id: 'generate', name: 'Token Generator', desc: 'Generate test JWT tokens', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>' },
        ];

        var commonSecrets = ['secret','password','123456','admin','key','jwt_secret','changeme','test','private','public','your-256-bit-secret','secretkey'];

        function render() {
            var s = document.getElementById('sidebar');
            s.innerHTML = tools.map(function(t) {
                return '<div class="sidebar-item" data-id="'+t.id+'" onclick="selectTool(\''+t.id+'\')">'+t.icon+t.name+'</div>';
            }).join('');
            selectTool('decode');
        }

        function selectTool(id) {
            document.querySelectorAll('.sidebar-item').forEach(function(el) { el.classList.remove('active'); });
            document.querySelector('[data-id="'+id+'"]').classList.add('active');
            document.getElementById('main').innerHTML = renderTool(id);
        }

        function renderTool(id) {
            var t = tools.find(function(x){return x.id===id;});
            var h = '<div class="tool-header"><h2>'+t.name+'</h2><p>'+t.desc+'</p></div>';
            if (id==='decode') h += decodeUI();
            if (id==='alg') h += algUI();
            if (id==='none') h += noneUI();
            if (id==='secret') h += secretUI();
            if (id==='expiry') h += expiryUI();
            if (id==='confusion') h += confusionUI();
            if (id==='claims') h += claimsUI();
            if (id==='generate') h += generateUI();
            return h;
        }

        function decodeUI() {
            return '<div class="input-area"><textarea id="jwtInput" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.dozjgNryP4J3jVmNHl0w5N_XgL0n3I9PlFUP0THsR8U" oninput="decodeJWT()"></textarea></div>'+
                '<div class="grid-2"><div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;margin-bottom:4px">Header</div><div class="result-box" id="headerBox"></div></div>'+
                '<div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;margin-bottom:4px">Payload</div><div class="result-box" id="payloadBox"></div></div></div>'+
                '<div class="mt-2"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;margin-bottom:4px">Signature</div><div class="result-box mono" id="sigBox"></div></div>'+
                '<div id="decodeAlerts"></div>'+
                '<script>setTimeout(function(){decodeJWT()},100)<\/script>';
        }

        function decodeJWT() {
            var v = document.getElementById('jwtInput').value.trim();
            var hb = document.getElementById('headerBox'), pb = document.getElementById('payloadBox'), sb = document.getElementById('sigBox'), ab = document.getElementById('decodeAlerts');
            if (!v) { hb.textContent='';pb.textContent='';sb.textContent='';ab.innerHTML='';return; }
            var parts = v.split('.');
            if (parts.length !== 3) { hb.textContent='Invalid JWT';pb.textContent='';sb.textContent='';ab.innerHTML='<div class="alert alert-danger">Invalid token format</div>';return; }
            try {
                var h = JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
                var p = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
                hb.textContent = JSON.stringify(h, null, 2); pb.textContent = JSON.stringify(p, null, 2); sb.textContent = parts[2];
                var alerts = [];
                if (h.alg === 'none') alerts.push('<div class="alert alert-danger">Algorithm is "none" — no signature verification</div>');
                if (h.alg && h.alg.startsWith('HS')) alerts.push('<div class="alert alert-info">HMAC algorithm ('+h.alg+')</div>');
                if (h.alg && h.alg.startsWith('RS')) alerts.push('<div class="alert alert-info">RSA algorithm ('+h.alg+')</div>');
                if (p.exp) {
                    var exp = new Date(p.exp * 1000), now = new Date();
                    if (exp < now) alerts.push('<div class="alert alert-danger">Token expired at '+exp.toLocaleString()+'</div>');
                    else alerts.push('<div class="alert alert-info">Expires: '+exp.toLocaleString()+'</div>');
                }
                if (!p.exp) alerts.push('<div class="alert alert-warn">No expiration claim — token never expires</div>');
                ab.innerHTML = alerts.join('');
            } catch(e) { hb.textContent='Decode error'; pb.textContent='Invalid encoding'; sb.textContent=''; }
        }

        function algUI() {
            return '<div class="input-area"><input type="text" id="algInput" placeholder="Paste JWT token" oninput="checkAlg()"></div><div id="algResult" class="result-box"></div><script>setTimeout(function(){checkAlg()},100)<\/script>';
        }

        function checkAlg() {
            var v = document.getElementById('algInput').value.trim(), r = document.getElementById('algResult');
            if (!v) { r.textContent='';return; }
            var parts = v.split('.');
            if (parts.length !== 3) { r.textContent='Invalid JWT';return; }
            try {
                var h = JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
                var issues = [];
                if (h.alg === 'none') issues.push('Critical: alg=none — no signature required');
                if (!h.alg) issues.push('No algorithm specified');
                if (h.alg && !['HS256','HS384','HS512','RS256','RS384','RS512','ES256','ES384','ES512','PS256','PS384','PS512'].includes(h.alg)) issues.push('Unknown algorithm: '+h.alg);
                r.textContent = 'Algorithm: '+(h.alg||'Not specified')+'\n\n'+(issues.length?issues.join('\n'):'Standard algorithm — no issues');
            } catch(e) { r.textContent='Decode error'; }
        }

        function noneUI() {
            return '<div class="input-area"><input type="text" id="noneInput" placeholder="Paste JWT token"></div><button class="btn btn-p" onclick="noneAttack()">Generate alg=none Token</button><div id="noneResult" class="result-box mt-2"></div>';
        }

        function noneAttack() {
            var v = document.getElementById('noneInput').value.trim(), r = document.getElementById('noneResult');
            if (!v) { r.textContent='Paste a token first';return; }
            var parts = v.split('.');
            if (parts.length !== 3) { r.textContent='Invalid JWT';return; }
            try {
                var p = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
                var noneHeader = btoa(JSON.stringify({alg:'none',typ:'JWT'})).replace(/=/g,'');
                var newPayload = btoa(JSON.stringify(p)).replace(/=/g,'');
                r.textContent = 'Tampered Token (alg=none):\n\n'+noneHeader+'.'+newPayload+'.';
            } catch(e) { r.textContent='Decode error'; }
        }

        function secretUI() {
            return '<div class="input-area"><input type="text" id="secretInput" placeholder="Paste HS256 JWT token"></div><button class="btn btn-p" onclick="checkSecret()">Test Common Secrets</button><div id="secretResult" class="result-box mt-2"></div>';
        }

        function checkSecret() {
            var v = document.getElementById('secretInput').value.trim(), r = document.getElementById('secretResult');
            if (!v) { r.textContent='Paste a token first';return; }
            r.textContent = 'Common secrets to test:\n\n'+commonSecrets.join('\n')+'\n\nTry these with an external JWT verifier.';
        }

        function expiryUI() {
            return '<div class="input-area"><input type="text" id="expiryInput" placeholder="Paste JWT token" oninput="checkExpiry()"></div><div id="expiryResult" class="result-box"></div><script>setTimeout(function(){checkExpiry()},100)<\/script>';
        }

        function checkExpiry() {
            var v = document.getElementById('expiryInput').value.trim(), r = document.getElementById('expiryResult');
            if (!v) { r.textContent='';return; }
            var parts = v.split('.');
            if (parts.length !== 3) { r.textContent='Invalid JWT';return; }
            try {
                var p = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
                var lines = [];
                if (p.exp) { var e = new Date(p.exp*1000); lines.push('Expires: '+e.toLocaleString()+' — '+(e<new Date()?'EXPIRED':'valid')); }
                else lines.push('No expiration — token never expires');
                if (p.nbf) lines.push('Not before: '+new Date(p.nbf*1000).toLocaleString());
                if (p.iat) lines.push('Issued at: '+new Date(p.iat*1000).toLocaleString());
                r.textContent = lines.join('\n');
            } catch(e) { r.textContent='Decode error'; }
        }

        function confusionUI() {
            return '<div class="input-area"><input type="text" id="confInput" placeholder="Paste RS256 JWT token"><input type="text" id="confPubKey" placeholder="Public key (PEM)" class="mt-2"></div><button class="btn btn-p" onclick="confusionAttack()">Test Key Confusion</button><div id="confResult" class="result-box mt-2"></div>';
        }

        function confusionAttack() {
            var v = document.getElementById('confInput').value.trim(), r = document.getElementById('confResult');
            if (!v) { r.textContent='Paste a token first';return; }
            var parts = v.split('.');
            if (parts.length !== 3) { r.textContent='Invalid JWT';return; }
            try {
                var h = JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
                if (!h.alg || !h.alg.startsWith('RS')) { r.textContent='Use RS256/RS384/RS512 tokens. Detected: '+(h.alg||'none');return; }
                r.textContent = 'Key Confusion Attack:\n\n1. Change algorithm to HS256\n2. Use the RSA public key as HMAC secret\n3. Re-sign the token\n\nIf accepted, the server is vulnerable.';
            } catch(e) { r.textContent='Decode error'; }
        }

        function claimsUI() {
            return '<div class="input-area"><input type="text" id="claimsInput" placeholder="Paste JWT token" oninput="showClaims()"></div><div id="claimsResult" class="result-box"></div><script>setTimeout(function(){showClaims()},100)<\/script>';
        }

        function showClaims() {
            var v = document.getElementById('claimsInput').value.trim(), r = document.getElementById('claimsResult');
            if (!v) { r.textContent='';return; }
            var parts = v.split('.');
            if (parts.length !== 3) { r.textContent='Invalid JWT';return; }
            try {
                var p = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
                var labels = {sub:'Subject',name:'Name',email:'Email',iat:'Issued at',exp:'Expiration',nbf:'Not before',iss:'Issuer',aud:'Audience',jti:'JWT ID'};
                r.innerHTML = Object.keys(p).map(function(k){return '<span style="color:var(--cyan)">'+k+'</span> <span style="color:var(--dim)">'+(labels[k]||'')+'</span>: '+JSON.stringify(p[k])}).join('<br>');
            } catch(e) { r.textContent='Decode error'; }
        }

        function generateUI() {
            return '<div class="input-area"><input type="text" id="genPayload" placeholder=\'{"sub":"123","name":"John"}\' class="mb-2"><input type="text" id="genSecret" placeholder="Secret key" class="mb-2"></div><button class="btn btn-p" onclick="genToken()">Generate Token</button><div id="genResult" class="result-box mt-2"></div>';
        }

        function genToken() {
            var payload = document.getElementById('genPayload').value.trim(), secret = document.getElementById('genSecret').value.trim()||'secret', r = document.getElementById('genResult');
            if (!payload) { r.textContent='Enter payload JSON';return; }
            try { JSON.parse(payload); } catch(e) { r.textContent='Invalid JSON';return; }
            var header = btoa(JSON.stringify({alg:'HS256',typ:'JWT'})).replace(/=/g,'');
            var body = btoa(payload).replace(/=/g,'');
            r.textContent = header+'.'+body+'.\n\nSign with HMAC-SHA256 using secret: '+secret;
        }

        render();
    </script>
</body>
</html>
